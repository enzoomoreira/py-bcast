[project]
name = "py-bcast"
version = "0.2.0"
description = "Python client for AE Broadcast market data terminal"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.28",
]

[project.optional-dependencies]
dde = ["pywin32>=306"]
dev = ["pytest>=7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/py_bcast"]

[tool.pytest.ini_options]
testpaths = ["tests"]
