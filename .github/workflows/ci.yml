name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff@0.15.16 check .
      - name: Ruff format check
        run: uvx ruff@0.15.16 format --check .

  test:
    # Windows-only: the package depends on pywin32. Integration tests that need
    # a running Broadcast terminal are auto-skipped by tests/conftest.py.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync
      - name: Run test suite
        run: uv run pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
